<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Interview Compiler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <style>
        :root { --bg: #1e1e1e; --panel: #252526; --border: #3e3e42; --accent: #007acc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; }

        /* Toolbar */
        .toolbar {
            height: 50px; background: var(--panel); display: flex; align-items: center;
            padding: 0 15px; gap: 10px; border-bottom: 1px solid var(--border);
        }
        input[type="text"] {
            padding: 6px; border-radius: 4px; border: 1px solid #555;
            background: #3c3c3c; color: #fff; width: 200px;
        }
        button {
            padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; color: white;
        }
        .btn-run { background: #16825d; }
        .btn-run:hover { background: #1a9c6e; }
        .btn-save { background: var(--accent); }
        .btn-save:hover { background: #005f9e; }

        /* Main Layout: Flex Row */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Left Sidebar (History) */
        .sidebar {
            width: 250px; background: #202020; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-header { padding: 10px; border-bottom: 1px solid var(--border); font-weight: bold; color: #aaa; font-size: 13px; }
        .history-list { flex: 1; overflow-y: auto; padding: 5px; }
        .history-item {
            padding: 8px; margin-bottom: 2px; cursor: pointer; border-radius: 4px;
            font-size: 13px; display: flex; justify-content: space-between; align-items: center;
        }
        .history-item:hover { background: #2a2a2a; }
        .history-item .delete-btn { color: #ff5555; font-weight: bold; margin-left: 5px; display: none; }
        .history-item:hover .delete-btn { display: block; }

        /* Middle: Code Editor (3/5) */
        .code-panel { flex: 3; display: flex; flex-direction: column; border-right: 2px solid var(--border); }
        .tab { padding: 5px 10px; background: #2d2d2d; font-size: 13px; color: #fff; border-bottom: 1px solid var(--border); }
        
        #editor { width: 100%; flex: 1; font-size: 16px; }

        /* Right: IO (2/5) */
        .io-panel { flex: 2; display: flex; flex-direction: column; }
        .io-section { flex: 1; display: flex; flex-direction: column; border-bottom: 1px solid var(--border); }
        .io-section:last-child { border-bottom: none; }
        .header { background: #2d2d2d; padding: 5px 10px; font-size: 12px; color: #aaa; border-bottom: 1px solid var(--border); }
        textarea {
            width: 100%; flex: 1; background: #1e1e1e; color: #d4d4d4;
            border: none; resize: none; padding: 10px;
            font-family: 'Consolas', monospace; font-size: 14px; outline: none;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <input type="text" id="fileName" placeholder="Filename (e.g., binary_search.cpp)" value="main.cpp">
        <button class="btn-save" onclick="saveCode()">💾 Save Code</button>
        <button class="btn-run" onclick="executeCode()">▶ Run C++</button>
        <span id="status" style="color: #888; font-size: 12px; margin-left: auto;">Ready</span>
    </div>

    <div class="main-container">
        <!-- Left: Saved Codes History -->
        <div class="sidebar">
            <div class="sidebar-header">SAVED CODES</div>
            <div class="history-list" id="historyList">
                <!-- Saved items will appear here -->
            </div>
        </div>

        <!-- Middle: Code Editor -->
        <div class="code-panel">
            <div class="tab" id="activeTab">main.cpp</div>
            <div id="editor"></div>
        </div>

        <!-- Right: Input/Output -->
        <div class="io-panel">
            <div class="io-section">
                <div class="header">INPUT (stdin)</div>
                <textarea id="inputBox" placeholder="Enter input here..."></textarea>
            </div>
            <div class="io-section">
                <div class="header">OUTPUT</div>
                <textarea id="outputBox" readonly placeholder="Output will appear here..."></textarea>
            </div>
        </div>
    </div>

    <script>
        // 1. Initialize Editor
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/c_cpp");
        
        // Default Boilerplate
        editor.setValue(`#include <iostream>
#include <vector>
#include <string>
using namespace std;

int main() {
    // Fast I/O
    ios_base::sync_with_stdio(false);
    cin.tie(NULL);

    int a, b;
    cin >> a >> b;
    cout << "Sum: " << (a + b) << endl;

    return 0;
}`, -1);

        // 2. History Management (LocalStorage)
        function loadHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('cpp_history') || '[]');
            
            if(history.length === 0) {
                list.innerHTML = '<div style="padding:10px; color:#666; font-size:12px; text-align:center;">No saved codes yet.</div>';
                return;
            }

            history.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span onclick="loadSnippet(${index})">${item.name}</span>
                    <span class="delete-btn" onclick="deleteSnippet(${index}, event)">×</span>
                `;
                list.appendChild(div);
            });
        }

        function saveCode() {
            const name = document.getElementById('fileName').value || "Untitled.cpp";
            const code = editor.getValue();
            
            let history = JSON.parse(localStorage.getItem('cpp_history') || '[]');
            
            // Check if name exists, update it
            const existingIndex = history.findIndex(item => item.name === name);
            if (existingIndex > -1) {
                history[existingIndex].code = code;
                history[existingIndex].time = new Date().toLocaleTimeString();
                setStatus("Code Updated!");
            } else {
                history.unshift({ name: name, code: code, time: new Date().toLocaleTimeString() });
                setStatus("Code Saved!");
            }
            
            localStorage.setItem('cpp_history', JSON.stringify(history));
            loadHistory();
        }

        function loadSnippet(index) {
            let history = JSON.parse(localStorage.getItem('cpp_history') || '[]');
            const item = history[index];
            if(item) {
                editor.setValue(item.code, -1);
                document.getElementById('fileName').value = item.name;
                document.getElementById('activeTab').innerText = item.name;
                setStatus("Loaded: " + item.name);
            }
        }

        function deleteSnippet(index, event) {
            event.stopPropagation(); // Prevent loading the code when clicking delete
            let history = JSON.parse(localStorage.getItem('cpp_history') || '[]');
            history.splice(index, 1);
            localStorage.setItem('cpp_history', JSON.stringify(history));
            loadHistory();
            setStatus("Deleted.");
        }

        // 3. Execution Logic (Wandbox API - Robust Config)
        async function executeCode() {
            const code = editor.getValue();
            const input = document.getElementById('inputBox').value;
            const outputBox = document.getElementById('outputBox');
            
            setStatus("Compiling...");
            outputBox.value = "Executing...";

            // Wandbox Configuration for GCC C++20
            const payload = {
                compiler: "gcc-head", // Use the rolling release for latest features
                code: code,
                stdin: input,
                options: "warning,gnu++2a" // Enable C++20 features
            };

            // Timeout Logic
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 12000); // 12s timeout

            try {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                // Handle HTTP Errors
                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`Server Error ${response.status}: ${text}`);
                }

                const result = await response.json();
                
                // Process Result
                let output = "";
                if (result.compiler_error) {
                    output = "=== Compilation Error ===\n" + result.compiler_error;
                } else if (result.program_error) {
                    output = "=== Runtime Error ===\n" + result.program_error;
                } else if (result.program_output) {
                    output = result.program_output;
                } else {
                    output = "Executed successfully (No output).";
                }

                outputBox.value = output;
                setStatus("Done");

            } catch (error) {
                if (error.name === 'AbortError') {
                    outputBox.value = "Error: Request Timed Out (12 seconds).\nThe server is busy or your code is stuck in an infinite loop.";
                    setStatus("Timeout");
                } else {
                    outputBox.value = "Connection Error:\n" + error.message + "\n\nPlease check your internet connection.";
                    setStatus("Error");
                }
            }
        }

        function setStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        // Initialize
        loadHistory();
    </script>
</body>
</html>
