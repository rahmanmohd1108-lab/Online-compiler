<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Compiler (Rextester)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <style>
        :root { --bg: #1e1e1e; --panel: #252526; --border: #3e3e42; --accent: #007acc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; }

        /* Toolbar */
        .toolbar {
            height: 50px; background: var(--panel); display: flex; align-items: center;
            padding: 0 15px; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        input[type="text"] {
            padding: 6px; border-radius: 4px; border: 1px solid #555;
            background: #3c3c3c; color: #fff; width: 150px;
        }
        select, button {
            padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold;
        }
        button { background: var(--accent); color: #fff; }
        button:hover { background: #005f9e; }
        .btn-file { background: #444; }

        /* Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Code Section (3/5) */
        .code-panel { flex: 3; display: flex; flex-direction: column; border-right: 2px solid var(--border); }
        
        /* IO Section (2/5) */
        .io-panel { flex: 2; display: flex; flex-direction: column; }

        .io-section { flex: 1; display: flex; flex-direction: column; border-bottom: 1px solid var(--border); }
        .io-section:last-child { border-bottom: none; }

        .header { background: #2d2d2d; padding: 5px 10px; font-size: 12px; color: #aaa; border-bottom: 1px solid var(--border); }
        
        #editor { width: 100%; flex: 1; font-size: 16px; }
        textarea {
            width: 100%; flex: 1; background: #1e1e1e; color: #d4d4d4;
            border: none; resize: none; padding: 10px;
            font-family: 'Consolas', monospace; font-size: 14px; outline: none;
        }
        .tab { padding: 5px 10px; background: #2d2d2d; font-size: 13px; color: #fff; }
    </style>
</head>
<body>

    <div class="toolbar">
        <input type="text" id="fileName" value="main.cpp">
        <button class="btn-file" onclick="createFile()">+ Create</button>
        
        <select id="language" onchange="changeLanguage()">
            <option value="cpp">C++</option>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="c">C</option>
        </select>

        <button onclick="executeCode()">▶ Run</button>
        <span id="status" style="color: #888; font-size: 12px;">Ready</span>
    </div>

    <div class="main-container">
        <div class="code-panel">
            <div class="tab" id="activeTab">main.cpp</div>
            <div id="editor"></div>
        </div>
        <div class="io-panel">
            <div class="io-section">
                <div class="header">INPUT (stdin)</div>
                <textarea id="inputBox" placeholder="Enter input here..."></textarea>
            </div>
            <div class="io-section">
                <div class="header">OUTPUT</div>
                <textarea id="outputBox" readonly placeholder="Output appears here..."></textarea>
            </div>
        </div>
    </div>

    <script>
        // 1. Initialize Editor
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/c_cpp");

        // 2. Boilerplate Code
        const boilerplate = {
            'cpp': `#include <iostream>
using namespace std;

int main() {
    int a, b;
    cin >> a >> b;
    cout << "Sum: " << (a + b) << endl;
    return 0;
}`,
            'python': `# Python Code
import sys

def solve():
    try:
        # Read all input from stdin
        input_data = sys.stdin.read().split()
        a = int(input_data[0])
        b = int(input_data[1])
        print("Sum:", a + b)
    except Exception as e:
        print("Error:", e)

if __name__ == "__main__":
    solve()`,
            'java': `import java.util.*;

public class Main {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);
        int a = sc.nextInt();
        int b = sc.nextInt();
        System.out.println("Sum: " + (a + b));
    }
}`,
            'c': `#include <stdio.h>

int main() {
    int a, b;
    scanf("%d %d", &a, &b);
    printf("Sum: %d\\n", a + b);
    return 0;
}`
        };

        // 3. Rextester Language IDs
        const langIds = {
            'cpp': 6,   // C++ (GCC)
            'c': 1,     // C (GCC)
            'java': 4,  // Java
            'python': 24 // Python 3
        };

        // 4. Switch Language
        function changeLanguage() {
            var lang = document.getElementById('language').value;
            
            // Update Editor Mode
            if(lang === 'python') editor.session.setMode("ace/mode/python");
            else if(lang === 'java') editor.session.setMode("ace/mode/java");
            else editor.session.setMode("ace/mode/c_cpp");

            // Update Filename extension
            var nameInput = document.getElementById('fileName');
            var name = nameInput.value.split('.')[0];
            var ext = lang === 'python' ? 'py' : lang === 'java' ? 'java' : lang === 'c' ? 'c' : 'cpp';
            nameInput.value = name + "." + ext;
            document.getElementById('activeTab').innerText = nameInput.value;

            // Load Boilerplate
            editor.setValue(boilerplate[lang], -1);
            setStatus("Ready");
        }

        // 5. Create File Logic
        function createFile() {
            let name = document.getElementById('fileName').value;
            document.getElementById('activeTab').innerText = name;
            editor.setValue("");
            editor.focus();
            setStatus("New File: " + name);
        }

        // 6. Execute Code (Using Rextester API via allorigins proxy to bypass CORS)
        async function executeCode() {
            var code = editor.getValue();
            var input = document.getElementById('inputBox').value;
            var langKey = document.getElementById('language').value;
            var langId = langIds[langKey];
            var outputBox = document.getElementById('outputBox');

            outputBox.value = "Executing...";
            setStatus("Connecting...");

            // Construct the form data payload required by Rextester
            var body = new URLSearchParams();
            body.append('LanguageChoiceWrapper', langId);
            body.append('Program', code);
            body.append('Input', input);
            body.append('CompilerArgs', ''); 

            // We use a proxy to bypass CORS restrictions for local files
            // Rextester endpoint
            var targetUrl = 'https://rextester.com/rundotnet/api';
            var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl);

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 second timeout

            try {
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body.toString(),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }

                const result = await response.json();

                // Rextester returns: { Result: "output", Warnings: "...", Errors: "...", Stats: "..." }
                let finalOutput = "";
                
                if (result.Errors) {
                    finalOutput = "=== Errors ===\n" + result.Errors;
                } 
                
                if (result.Result) {
                    finalOutput += result.Result;
                }
                
                if (!finalOutput) {
                    finalOutput = "(No output or empty response)";
                }

                outputBox.value = finalOutput;
                setStatus("Done");

            } catch (error) {
                if (error.name === 'AbortError') {
                    outputBox.value = "Error: Request Timed Out (15s).\nThe server might be busy.";
                    setStatus("Timeout");
                } else {
                    outputBox.value = "Error: Failed to connect to Execution Server.\n\nDetails: " + error.message + 
                                      "\n\nTroubleshooting:\n1. Check your internet connection.\n2. If you are using a corporate laptop, try using your personal WiFi.\n3. Try running this file using a local server (e.g., 'Live Server' in VS Code).";
                    setStatus("Error");
                }
            }
        }

        function setStatus(msg) {
            document.getElementById('status').innerText = msg;
        }
    </script>
</body>
</html>
