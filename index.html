<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Compiler (Fixed)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <style>
        /* Reset & Layout */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1e1e1e;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Toolbar */
        .toolbar {
            height: 50px;
            background-color: #2d2d2d;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
            border-bottom: 1px solid #444;
        }
        input[type="text"] {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #3c3c3c;
            color: white;
            width: 150px;
        }
        select, button {
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button { background-color: #007acc; color: white; }
        button:hover { background-color: #005f9e; }
        .btn-secondary { background-color: #444; }

        /* Main Container: Flex Row */
        .main-container {
            display: flex;
            flex: 1; /* Fills remaining height */
            overflow: hidden;
        }

        /* Left: 3/5 Width */
        .code-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #444;
        }

        /* Right: 2/5 Width */
        .io-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
        }

        /* Split Right side into Input/Output */
        .io-section {
            flex: 1; /* Each takes 1/2 of the right panel */
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #444;
        }
        .io-section:last-child { border-bottom: none; }

        .header {
            background-color: #252526;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            color: #bbb;
            border-bottom: 1px solid #3e3e42;
        }

        /* Editor & Textareas */
        #editor { width: 100%; flex: 1; font-size: 16px; }
        textarea {
            width: 100%;
            flex: 1;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: none;
            resize: none;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            outline: none;
        }

        /* Tab Visuals */
        .tab-bar {
            background-color: #252526;
            padding-left: 10px;
            font-size: 13px;
            display: flex;
            align-items: center;
            height: 30px;
            color: #fff;
        }
        #status { color: #888; font-size: 12px; margin-left: auto; }
    </style>
</head>
<body>

    <!-- Toolbar -->
    <div class="toolbar">
        <input type="text" id="fileName" placeholder="filename.cpp" value="main.cpp">
        <button class="btn-secondary" onclick="createFile()">+ Create</button>
        
        <select id="language" onchange="updateLang()">
            <option value="cpp">C++ (GCC)</option>
            <option value="c">C (GCC)</option>
            <option value="python">Python 3</option>
            <option value="java">Java</option>
        </select>
        
        <button onclick="runCode()">▶ Run</button>
        <span id="status">Ready</span>
    </div>

    <!-- Main Layout -->
    <div class="main-container">
        <!-- Code Editor (Left) -->
        <div class="code-panel">
            <div class="tab-bar" id="activeTab">main.cpp</div>
            <div id="editor"></div>
        </div>

        <!-- Input/Output (Right) -->
        <div class="io-panel">
            <!-- Input Box -->
            <div class="io-section">
                <div class="header">INPUT (stdin)</div>
                <textarea id="inputBox" placeholder="Enter input here..."></textarea>
            </div>
            <!-- Output Box -->
            <div class="io-section">
                <div class="header">OUTPUT</div>
                <textarea id="outputBox" readonly placeholder="Output appears here..."></textarea>
            </div>
        </div>
    </div>

    <script>
        // 1. Initialize Editor
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/c_cpp");
        editor.setValue(`#include <iostream>
using namespace std;

int main() {
    int x, y;
    // Read input from stdin
    if (cin >> x >> y) {
        cout << "Sum: " << (x + y) << endl;
    }
    return 0;
}`, -1);

        // 2. Configuration for Wandbox API
        // Wandbox uses specific compiler names
        const compilers = {
            'cpp': { name: 'gcc-head', ext: 'cpp' },
            'c':   { name: 'gcc-head-c', ext: 'c' },
            'python': { name: 'cpython-3.10.0', ext: 'py' },
            'java': { name: 'openjdk-head', ext: 'java' }
        };

        // 3. Change Editor Language
        function updateLang() {
            let lang = document.getElementById('language').value;
            if(lang === 'c' || lang === 'cpp') editor.session.setMode("ace/mode/c_cpp");
            else if(lang === 'python') editor.session.setMode("ace/mode/python");
            else if(lang === 'java') editor.session.setMode("ace/mode/java");
        }

        // 4. Create File Logic
        function createFile() {
            let name = document.getElementById('fileName').value;
            if(!name) return;
            
            document.getElementById('activeTab').innerText = name;
            editor.setValue("");
            editor.focus();

            // Simple auto-detect
            if(name.endsWith('.py')) document.getElementById('language').value = 'python';
            else if(name.endsWith('.java')) document.getElementById('language').value = 'java';
            else if(name.endsWith('.c')) document.getElementById('language').value = 'c';
            else document.getElementById('language').value = 'cpp';
            
            updateLang();
            setStatus("Created " + name);
        }

        // 5. Execute Code using Wandbox API
        async function runCode() {
            const code = editor.getValue();
            const input = document.getElementById('inputBox').value;
            const langKey = document.getElementById('language').value;
            const config = compilers[langKey];
            
            document.getElementById('outputBox').value = "Executing...";
            setStatus("Connecting to compiler...");

            // Wandbox requires specific JSON structure
            const body = {
                compiler: config.name,
                code: code,
                stdin: input,
                options: "warning,gnu++1y" // Compiler options
            };

            try {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const result = await response.json();

                // Build Output string
                let output = "";
                
                // Check for compiler errors first
                if (result.compiler_error) {
                    output = "=== Compilation Error ===\n" + result.compiler_error;
                } 
                // Check for program output
                else if (result.program_output) {
                    output = result.program_output;
                } 
                // Check for runtime errors
                else if (result.program_error) {
                    output = "=== Runtime Error ===\n" + result.program_error;
                }
                // Fallback
                else {
                    output = JSON.stringify(result, null, 2);
                }

                document.getElementById('outputBox').value = output;
                setStatus("Execution finished");

            } catch (error) {
                document.getElementById('outputBox').value = "Error: Could not connect to Wandbox API.\nPlease check your internet connection.\n\n" + error;
                setStatus("Network Error");
            }
        }

        function setStatus(msg) {
            document.getElementById('status').innerText = msg;
        }
    </script>
</body>
</html>
